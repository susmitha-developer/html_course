<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #loader{
            width: 100px;
            height: 100px;
            border:2px solid rebeccapurple;
            border-top: 6px solid red;
            animation: circle 1s ease-in;
            margin-bottom: 30px;
        }





        @keyframes circle {
            100%{
                transform: rotate(360deg);
            }
            
        }



        #btn{
            padding: 12px 25px;
            background-color: greenyellow;
            font-size: 16px;
            transition: all 0.4s ease;
            margin-bottom: 10px;

        }
        #btn:hover{
            transform: translateY(-10px);
        }

        
        #sidebar{
            width: 200px;
            height: 100px;
            background-color: palevioletred;
            color: blue;
            left: -200px;
            position: fixed;

            padding: 20px;
            animation: slide 4s ease-in forwards;
        }


        @keyframes slide{
            to{
                left:0;
            }
        }
    </style>
</head>
<body>
    <div id="loader">

    </div>


    <button id="btn">submit</button>


    <div id="card">product card</div>


    <div id="sidebar">
        <h3>menu</h3>
        <p>home</p>
        <p>about</p>
        <p>contact</p>
    </div>
    
</body>
</html>
